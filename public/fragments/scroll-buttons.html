<div class="fixed right-4 top-1/2 -translate-y-1/2 flex flex-col gap-2 z-50 mobile-fixed" v-if="user && user.show_scroll_buttons" style="pointer-events: auto; transform: translateY(-50%);">
    <button 
        @click="scrollToTop" 
        class="p-2 bg-white/80 backdrop-blur text-gray-600 rounded-full shadow-lg hover:bg-purple-600 hover:text-white transition-all transform hover:scale-110 border border-gray-100"
        :title="t.scrollToTop"
    >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
        </svg>
    </button>
    <button 
        @click="scrollToBottom" 
        class="p-2 bg-white/80 backdrop-blur text-gray-600 rounded-full shadow-lg hover:bg-purple-600 hover:text-white transition-all transform hover:scale-110 border border-gray-100"
        :title="t.scrollToBottom"
    >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
        </svg>
    </button>
</div>
